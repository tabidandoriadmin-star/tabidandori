<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">たびダンドリ ロゴ案 v2</title>
  <desc id="desc">チェックリスト、ピン、旅程ステップを組み合わせた旅行管理アプリ「たびダンドリ」の横組みロゴ</desc>
  <rect width="1200" height="420" fill="white"/>

  <!-- Symbol: checklist + trip pin -->
  <g transform="translate(78 70)">
    <rect x="0" y="0" width="280" height="280" rx="72" fill="#F7F3EA"/>

    <!-- checklist card -->
    <rect x="66" y="54" width="148" height="178" rx="28" fill="white" stroke="#0F6E56" stroke-width="14"/>
    <path d="M99 106 L116 123 L146 86" fill="none" stroke="#0F6E56" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="160" y1="107" x2="184" y2="107" stroke="#8DCDBE" stroke-width="14" stroke-linecap="round"/>
    <path d="M99 160 L116 177 L146 140" fill="none" stroke="#0F6E56" stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="160" y1="161" x2="184" y2="161" stroke="#8DCDBE" stroke-width="14" stroke-linecap="round"/>

    <!-- small route steps -->
    <circle cx="82" cy="242" r="10" fill="#0F6E56"/>
    <line x1="100" y1="242" x2="146" y2="242" stroke="#8DCDBE" stroke-width="10" stroke-linecap="round"/>
    <circle cx="164" cy="242" r="10" fill="#0F6E56"/>

    <!-- pin -->
    <path d="M204 129 C204 96 230 72 262 72 C294 72 320 96 320 129 C320 177 262 229 262 229 C262 229 204 177 204 129Z"
          transform="translate(-48 0)"
          fill="#0F6E56"/>
    <circle cx="214" cy="129" r="22" fill="white"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(408 112)">
    <text x="0" y="96"
          font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif"
          font-size="84"
          font-weight="800"
          letter-spacing="1"
          fill="#094A3A">たびダンドリ</text>
    <text x="4" y="158"
          font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif"
          font-size="30"
          font-weight="600"
          letter-spacing="1.2"
          fill="#0F6E56">TabiDandori</text>
    <text x="4" y="210"
          font-family="'Noto Sans JP', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif"
          font-size="26"
          font-weight="500"
          fill="#43524D">旅の段取り、まるごとひとつに。</text>
  </g>
</svg>
